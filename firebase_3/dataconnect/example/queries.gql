mutation CreateRole @auth(expr: "auth.token.admin == true") {
  role_insert(data: {roleName: "Editor", permissions: "read,write"})
}

mutation CreateSession($userId: UUID!, $device: String!) @auth(level: USER) {
  session_insert(data: {userId: $userId, deviceFingerprint: $device, expiresAt: "2025-12-31T23:59:59Z"})
}

mutation UpdateUserDisplayName($newDisplayName: String!) @auth(level: USER) {
  user_update(key: {id_expr: "auth.uid"}, data: {displayName: $newDisplayName})
}

query ListUserRoles @auth(level: USER) {
  userRoles {
    user { email }
    role { roleName }
  }
}